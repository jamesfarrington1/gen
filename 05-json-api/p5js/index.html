<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Weather Demo with p5.js</title>
        <style>
            body {
                margin: 0;
            }
            .weather-input {
                padding: 8px 10px;
                font-size: 14px;
                border: 1px solid #ccc;
                border-radius: 6px;
            }

            .weather-input:focus {
                border-color: #333;
                outline: none;
            }

            .weather-button {
                padding: 8px 12px;
                font-size: 14px;
                background: #111;
                color: white;
                border: none;
                border-radius: 6px;
                cursor: pointer;
            }

            .weather-button:hover {
                background: #333;
            }
        </style>
    </head>
    <body>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.0.0/p5.js"></script>
        <script src="./common/main.js"></script>
    </body>
</html>
